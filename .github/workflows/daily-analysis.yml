# Daily full run — Nifty 50, news + sentiment + fundamentals + technicals.
# Market data: yfinance (primary) + jugaad-data (fallback). No broker API keys.
#
# Triggers: daily schedule (~08:00 IST), push to main/master, manual dispatch.
# Schedule: GitHub `cron` is UTC. Default = 08:00 IST → 02:30 UTC.
#
# Optional secrets (Settings → Secrets and variables → Actions):
#   MAIN_PY_ARGS — override default (e.g. "--ai --provider openai --pdf --pdf-file report.pdf")
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, AI_PROVIDER — only if MAIN_PY_ARGS includes --ai
#
# Default command: python main.py --drop-missing
#   (same as local full run, but drops symbols with no price data so CI does not fail on one bad ticker)

name: Daily market analysis

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: daily-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py (full analysis)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          MAIN_PY_ARGS: ${{ secrets.MAIN_PY_ARGS }}
        run: |
          set -e
          if [ -n "${MAIN_PY_ARGS}" ]; then
            # shellcheck disable=SC2086
            python main.py ${MAIN_PY_ARGS}
          else
            python main.py --drop-missing
          fi
