# Daily run — free market data (yfinance + jugaad-data fallback). No broker API keys.
#
# Schedule: GitHub `cron` is UTC. Default = 08:00 IST → 02:30 UTC.
#
# Secrets (optional): ANTHROPIC_API_KEY, OPENAI_API_KEY, AI_PROVIDER, MAIN_PY_ARGS
# Example MAIN_PY_ARGS: "--skip-news --finbert"

name: Daily market analysis

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: daily-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          MAIN_PY_ARGS: ${{ secrets.MAIN_PY_ARGS }}
        run: |
          set -e
          if [ -n "${MAIN_PY_ARGS}" ]; then
            # shellcheck disable=SC2086
            python main.py ${MAIN_PY_ARGS}
          else
            python main.py --skip-news
          fi
